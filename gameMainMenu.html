<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <link rel="stylesheet" href="mainMenuCode/mainMenu.css">

</head>
<body>
    <div class="cardHolder">
        <div class="card leftAlign confessionRoulette">
            <div class="textContent">
                <span class="title">Confession Roulette</span>
                <a href="/roulette" class="button">Play Confession Roulette</a>
            </div>
            <span class="icon">?</span>
        </div>
        <div class="card rightAlign impostor">
            <div class="textContent">
                <span class="title">Impostor</span>
                <a href="/impostor" class="button">Play Impostor</a>
            </div>
            <img class="icon" src="mainMenuCode/eyecon.png">
        </div>
        <div class="card leftAlign friendWeb">
            <div class="textContent">
                <span class="title">Friend Web</span>
                <a href="/web#skipToGraph" class="button">See the Map</a>
            </div>
            <span class="icon">🕸️</span>
        </div>
    </div>
    <a class="math"  href="/index">Math Links</a>
