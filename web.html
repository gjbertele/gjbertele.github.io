<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend Map</title>
    <link rel="stylesheet" href="fgWebCode/web.css">
</head>
<body>
    <span class="overlayText"></span>
    <div class="setup">
        <div class="enterName">
            <span class="text">What's your name?</span>
            <span class="incorrectInput"></span>
            <input class="nameInput editableLabel" type="text" placeholder="Type here">
            <svg class="nextButton" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g clip-path="url(#clip0_6_13418)">
                <path d="M15 5L13.59 6.41L18.17 11H2V13H18.17L13.58 17.59L15 19L22 12L15 5Z" fill="#FFF"/>
                </g>
                <defs>
                <clipPath id="clip0_6_13418">
                <rect width="24" height="24" fill="white"/>
                </clipPath>
                </defs>
            </svg>
        </div>
        <div class="enterFriends">
            <span class="text">Who are you friends with?</span>
            <div class="friendHolder scrollable"></div>
            <div class="addFriendButton">Add A Friend</div>
            <div class="submit">Submit</div>
        </div>
        <span class="bottomWarning">Your name cannot be changed later.</span>
    </div>
    <div class="loading">
        <div class="loadingIcon"></div>
    </div>
    <div class="graph">
        <canvas class="mainCanvas"></canvas>
        <svg class="refreshButton" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#clip0_6_13662)">
            <path d="M12 4V1L8 5L12 9V6C15.31 6 18 8.69 18 12C18 13.01 17.75 13.97 17.3 14.8L18.76 16.26C19.54 15.03 20 13.57 20 12C20 7.58 16.42 4 12 4ZM12 18C8.69 18 6 15.31 6 12C6 10.99 6.25 10.03 6.7 9.2L5.24 7.74C4.46 8.97 4 10.43 4 12C4 16.42 7.58 20 12 20V23L16 19L12 15V18Z" fill="#FFF"/>
            </g>
            <defs>
            <clipPath id="clip0_6_13662">
            <rect width="24" height="24" fill="white"/>
            </clipPath>
            </defs>
        </svg>
        <svg class="backButton" width="24" height="24" viewBox="0 0 14.15 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#clip0_6_13443)">
            <path d="M11.67 3.86998L9.9 2.09998L0 12L9.9 21.9L11.67 20.13L3.54 12L11.67 3.86998Z" fill="#FFF"/>
            </g>
        </svg>
    </div>
    <script src="fgWebCode/graph.js"></script>
    <script src="fgWebCode/setup.js"></script>
</body>
</html>
