                <span class="seeOtherImpostorsTitle settingsEntryTitle">Impostors See Other Impostors</span>

                    <input type="checkbox" class="seeOtherImpostorsBox settingsEntryCheck">
                    <div class="settingsEntryCheckSlider"></div>
                </div>
            </div>
            <div class="categoriesAllowed">
                <span class="settingsEntryTitle categoriesAllowedTitle">Included Categories</span>

        <svg class="backButton" width="24" height="24" viewBox="0 0 14.15 24" fill="none" xmlns="http://www.w3.org/2000/svg">
