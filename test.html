<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Confess Up</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --border: #222;
    --accent: #ff3c3c;
    --accent2: #ffcc00;
    --text: #f0ede8;
    --muted: #555;
    --checked-bg: #1a0a0a;
    --checked-border: #ff3c3c;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 60px;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
  }

  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    line-height: 0.9;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .header-title span {
    color: var(--accent);
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
  }

  .counter-badge {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--accent2);
    background: rgba(255,204,0,0.08);
    border: 1px solid rgba(255,204,0,0.2);
    padding: 3px 10px;
    border-radius: 2px;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Questions section */
  .section-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 24px 20px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .questions-list {
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .q-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 14px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
    overflow: hidden;
  }

  .q-item:active {
    transform: scale(0.985);
  }

  .q-item.checked {
    background: var(--checked-bg);
    border-color: var(--checked-border);
  }

  .q-item.checked .q-text {
    color: var(--accent);
  }

  /* Flash animation on check */
  .q-item::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255, 60, 60, 0.08);
    opacity: 0;
    pointer-events: none;
  }

  .q-item.flash::after {
    animation: flash 0.25s ease-out;
  }

  @keyframes flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Custom checkbox */
  .q-checkbox {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 4px;
    border: 1.5px solid var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }

  .q-item.checked .q-checkbox {
    border-color: var(--accent);
    background: var(--accent);
  }

  .q-checkbox svg {
    width: 13px;
    height: 13px;
    stroke: #fff;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.15s, transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .q-item.checked .q-checkbox svg {
    opacity: 1;
    transform: scale(1);
  }

  .q-num {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.05em;
    min-width: 22px;
    text-align: right;
    font-style: italic;
  }

  .q-item.checked .q-num {
    color: rgba(255,60,60,0.4);
  }

  .q-text {
    font-size: 13px;
    line-height: 1.45;
    color: #c0bdb8;
    font-weight: 300;
    transition: color 0.15s;
    flex: 1;
  }

  /* Divider between groups */
  .q-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 14px;
    opacity: 0.5;
  }

  /* Bottom form */
  .form-section {
    padding: 32px 16px 0;
  }

  .form-field {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    padding-left: 2px;
  }

  .form-label span {
    color: var(--accent);
  }

  textarea, input[type="text"] {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 300;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
    -webkit-appearance: none;
  }

  textarea {
    min-height: 110px;
    line-height: 1.6;
  }

  textarea::placeholder, input[type="text"]::placeholder {
    color: var(--muted);
    font-style: italic;
  }

  textarea:focus, input[type="text"]:focus {
    border-color: rgba(255,60,60,0.5);
    box-shadow: 0 0 0 3px rgba(255,60,60,0.06);
  }

  /* Submit button */
  .submit-wrap {
    padding: 24px 16px 0;
  }

  .submit-btn {
    width: 100%;
    padding: 18px 24px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 0.08em;
    color: #fff;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 0 0 0 rgba(255,60,60,0);
  }

  .submit-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .submit-btn:active {
    transform: scale(0.97);
  }

  .submit-btn:hover {
    box-shadow: 0 6px 30px rgba(255, 60, 60, 0.35);
  }

  /* Footer note */
  .footer-note {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    font-style: italic;
    padding: 20px 16px 0;
    line-height: 1.6;
  }

  /* Entrance animations */
  .q-item {
    opacity: 0;
    transform: translateY(6px);
    animation: fadeUp 0.3s forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">

  <header class="header">
    <div class="header-eyebrow">Never have I ever</div>
    <div class="header-title">CONFESS<span>.</span></div>
    <div class="header-meta">
      <div class="counter-badge" id="counter">0 / 50 checked</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress"></div>
      </div>
    </div>
  </header>

  <div class="section-label">Check everything that applies to you</div>

  <div class="questions-list" id="questions-list">
    <!-- Questions injected by JS -->
  </div>

  <div class="form-section">
    <div class="section-label" style="padding-top:0; margin-bottom: 16px;">Your confession</div>

    <div class="form-field">
      <label class="form-label" for="confession">Anything else you want to <span>admit</span>?</label>
      <textarea id="confession" placeholder="Go on, no one's judging... (yet)"></textarea>
    </div>

    <div class="form-field">
      <label class="form-label" for="username">Your <span>name</span></label>
      <input type="text" id="username" placeholder="Who are we exposing today?" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>

    <div class="submit-wrap">
      <button class="submit-btn" onclick="handleSubmit()">Submit &amp; Spin</button>
    </div>

    <div class="footer-note">
      Your answers are between you, us, and everyone in the room.
    </div>
  </div>

</div>

<script>
  const questions = [
    "Gone skinny dipping",
    "Lied about my age",
    "Fallen asleep in public",
    "Sent a text to the wrong person",
    "Cheated on a test or exam",
    "Forgotten someone's name mid-conversation",
    "Stalked an ex on social media",
    "Pretended not to see someone in public",
    "Eaten food off the floor",
    "Blamed something on a sibling or friend",
    "Ghosted someone I liked",
    "Lied on my CV or résumé",
    "Stayed in a relationship too long",
    "Made a purchase I immediately regretted",
    "Talked about someone right before they walked in",
    "Faked being sick to get out of plans",
    "Kissed a friend's partner",
    "Done something embarrassing and blamed it on alcohol",
    "Snooped through someone's phone",
    "Been arrested or detained",
    "Told a secret I was sworn to keep",
    "Gone 48+ hours without showering",
    "Slid into someone's DMs and regretted it immediately",
    "Talked to myself in public",
    "Broken something and hidden the evidence",
    "Cried at a movie I pretended not to care about",
    "Had a crush on a teacher or superior",
    "Eaten an entire meal and immediately wanted more",
    "Waved back at someone who wasn't waving at me",
    "Regifted a present",
    "Made a promise I knew I wouldn't keep",
    "Pretended to know a song and just mumbled along",
    "Had a secret social media account",
    "Accidentally liked a very old photo while stalking someone",
    "Ordered something online while drunk",
    "Laughed at completely the wrong moment",
    "Walked into a glass door",
    "Cried in a public bathroom",
    "Pretended to be on the phone to avoid someone",
    "Eaten something I found in my bag without knowing how old it was",
    "Lost money gambling",
    "Told someone I loved them before I meant it",
    "Read someone's diary or private messages",
    "Shown up to the wrong place at the wrong time",
    "Spelled a word wrong in an important message and only noticed after sending",
    "Had a dream about someone in this room",
    "Lied about having read or watched something",
    "Done something illegal and gotten away with it",
    "Pretended to understand something I had no idea about",
    "Intentionally ignored a call from a family member",
  ];

  const list = document.getElementById('questions-list');
  const counter = document.getElementById('counter');
  const progress = document.getElementById('progress');
  let checked = new Set();

  function updateMeta() {
    const n = checked.size;
    const total = questions.length;
    counter.textContent = `${n} / ${total} checked`;
    progress.style.width = `${(n / total) * 100}%`;
  }

  questions.forEach((q, i) => {
    const item = document.createElement('div');
    item.className = 'q-item';
    item.style.animationDelay = `${Math.min(i * 18, 400)}ms`;
    item.innerHTML = `
      <div class="q-checkbox">
        <svg viewBox="0 0 14 14"><polyline points="2,7 6,11 12,3"/></svg>
      </div>
      <span class="q-num">${String(i + 1).padStart(2, '0')}</span>
      <span class="q-text">${q}</span>
    `;
    item.addEventListener('click', () => {
      if (checked.has(i)) {
        checked.delete(i);
        item.classList.remove('checked');
      } else {
        checked.add(i);
        item.classList.add('checked');
        item.classList.remove('flash');
        void item.offsetWidth;
        item.classList.add('flash');
      }
      updateMeta();
    });
    list.appendChild(item);

    // Add visual divider every 10 questions
    if ((i + 1) % 10 === 0 && i < questions.length - 1) {
      const div = document.createElement('div');
      div.className = 'q-divider';
      list.appendChild(div);
    }
  });

  updateMeta();

  function handleSubmit() {
    const name = document.getElementById('username').value.trim();
    const confession = document.getElementById('confession').value.trim();
    const checkedQuestions = [...checked].map(i => questions[i]);

    // Replace with your actual submit logic
    console.log({ name, confession, checkedQuestions });
    alert(`Submitted! ${name || 'Anonymous'} checked ${checkedQuestions.length} questions.`);
  }
</script>

</body>
</html>
