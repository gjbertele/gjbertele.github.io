<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameshow</title>
    <link rel="stylesheet" href="gameshowCode/css/main.css">
    <link rel="stylesheet" href="gameshowCode/css/initialPage.css">
    <link rel="stylesheet" href="gameshowCode/css/mainVideoPage.css">
    <link rel="stylesheet" href="gameshowCode/css/chatPage.css">
    <link rel="icon" href="gameshowCode/heartemoji.ico">
</head>
<body>
    <div class="initialPage">
        <div class="contentHolder">
            <div class="titleHolder">
                <div class="heart">❤️</div>
                <h1 class="title titleTextContent"></h1>
            </div>
            <div class="lineSeparator"></div>
            <div class="inputHolder">
                <div class="nameHolder">
                    <label class="nameLabel">your name</label>
                    <input type="text" placeholder="Enter your name..." class="nameInput">
                </div>
                <button class="joinButton joinContestantButton">Join as Contestant</button>
                <button class="joinButton joinSpectatorButton">Join as Spectator</button>
            </div>
            <div class="lineSeparator"></div>
        </div>
    </div>
    <div class="mainVideoPage">
        <div class="self-bar">
          <p class="page-title titleTextContent">Title</p>
          <div class="self-controls">
            <button class="ctrl-btn cameraToggle">
              <svg class="ctrl-icon" viewBox="0 0 16 16"><rect x="2" y="4" width="9" height="8" rx="1"></rect><path d="M11 6l3-2v6l-3-2"></path></svg>
              Camera
            </button>
            <button class="ctrl-btn audioToggle">
              <svg class="ctrl-icon" viewBox="0 0 16 16"><rect x="5" y="1" width="6" height="9" rx="3"></rect><path d="M3 8a5 5 0 0010 0"></path><line x1="8" y1="13" x2="8" y2="15"></line></svg>
              Mic
            </button>
            <button class="ctrl-btn heartToggle">
                ❤️ Enable Hearts
            </button>
            <button class="ctrl-btn phoneAFriendButton">
                📞 Phone a Friend
            </button>
            <button class="ctrl-btn chatButton">
                💬 Chat
            </button>
          </div>
        </div>
      
        <div class="divider" style="margin-top: 0;"></div>
      
        <p class="section-label">Host</p>
        <div class="video-grid priorityMediaHolder">
        </div>
      
        <div class="divider"></div>
      
        <p class="section-label">Contestants</p>
        <div class="video-grid contestantMediaHolder">
        </div>
      
        <div class="divider"></div>
      
        <p class="section-label">Spectators</p>
        <div class="video-grid crowdMediaHolder">
        </div>
      
    </div>

    <div class="chatPage">
        <div class="topBar">
            <div class="backButton">⬅️</div>
            <p class="page-title titleTextContent">Title</p>
        </div>
        <div class="messageHolder scrollable">
        </div>
        <div class="inputHolder">
            <div class="controls">
                <div class="sendButton">Send</div>
            </div>
            <input type="text" placeholder="Send a message" class="messageInput">
        </div>
    </div>

    <div class="videoElementStorage"></div>
    <script src="gameshowCode/js/uiHandler.js"></script>
    <script src="gameshowCode/js/serverHandler.js"></script>
    <script src="gameshowCode/js/mediaHandler.js"></script>
    <script src="gameshowCode/js/streamingHandler.js"></script>
</body>
</html>
